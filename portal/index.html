<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreelanceJury</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #1a1a2e; }
    form { display: flex; flex-direction: column; gap: 0.75rem; }
    textarea, input { padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.75rem; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    #result { margin-top: 1rem; padding: 1rem; background: #f4f4f4; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>⚖️ FreelanceJury</h1>
  <p>AI-powered freelancer vs client dispute resolution</p>
  <form hx-post="/api/open_case" hx-target="#result" hx-swap="innerHTML">
    <textarea name="agreement" rows="3" placeholder="Paste the agreement/contract terms" required></textarea>
    <input name="deliverable_url" type="url" placeholder="Deliverable URL" required>
    <textarea name="client_complaint" rows="2" placeholder="Client's complaint" required></textarea>
    <textarea name="freelancer_defense" rows="2" placeholder="Freelancer's defense" required></textarea>
    <button type="submit">Submit Dispute</button>
  </form>
  <div id="result"></div>
</body>
</html>
